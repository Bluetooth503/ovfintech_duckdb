version: 2

models:
  - name: dws_fund_credit_state_df
    description: "授信额度当前状态表，记录每个授信的最新状态（T-1日）"
    columns:
      - name: credit_id
        description: "授信ID"
      - name: customer_id
        description: "客户ID"
      - name: customer_name
        description: "客户名称"
      - name: customer_type
        description: "客户类型（1=个人，2=企业）"
      - name: credit_apply_sn
        description: "业务编号"
      - name: customer_contract_no
        description: "客户合同编号"
      - name: credit_quota
        description: "授信额度"
      - name: remain_quota
        description: "剩余额度"
      - name: credit_used_quota
        description: "授信已用额度"
      - name: base_rate
        description: "基础利率"
      - name: rate_float
        description: "浮动利率"
      - name: credit_start_date
        description: "授信起期"
      - name: credit_end_date
        description: "授信止期"
      - name: financial_product_id
        description: "金融产品ID"
      - name: financial_product_name
        description: "金融产品名称"
      - name: fund_org_id
        description: "资金方ID"
      - name: fund_org_name
        description: "资金方名称"
      - name: loop_flag
        description: "循环标志"
      - name: repay_type
        description: "还款方式"
      - name: remaining_exposure
        description: "剩余敞口"
      - name: margin_ratio
        description: "保证金比例"
      - name: reply_no
        description: "批复号"
      - name: credit_result
        description: "授信结果（0=有效，1=无效）"
      - name: credit_status
        description: "授信状态"
      - name: remark
        description: "备注"
      - name: push_type
        description: "推送类型"
      - name: utilization_rate
        description: "用信率（%）"
      - name: is_valid_credit
        description: "是否有效授信"
      - name: has_balance
        description: "是否有余额"
      - name: stats_date
        description: "统计日期（T-1）"
      - name: trx_date
        description: "最新更新日期"
      - name: update_time
        description: "最新更新时间"
      - name: dw_update_time
        description: "数据仓库更新时间"

