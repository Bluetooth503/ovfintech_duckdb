        description: "系统牛只数（预期容量）"
      - name: recipe_sku_id
        description: "配方SKU ID（配方对应的饲料类型）"
      - name: recipe_sku_name
        description: "配方SKU名称"
      - name: recipe_weight_begin
        description: "配方适用体重起始"
      - name: recipe_weight_end
        description: "配方适用体重结束"
      - name: recipe_feed_meat_ratio
        description: "配方目标料肉比"
      - name: recipe_plan_days
        description: "配方计划天数"
      - name: dw_effective_date
        description: "生效日期"
      - name: dw_expiry_date
        description: "失效日期"
      - name: is_current
        description: "是否当前记录"
