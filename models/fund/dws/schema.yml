version: 2

models:
  - name: dws_fund_customer_credit_agg_df
    description: "客户授信明细日统计表，按客户、授信、日期维度统计每笔授信的详细信息"
    columns:
      - name: stats_date
        description: "统计日期"
      - name: customer_id
        description: "客户ID"
      - name: customer_name
        description: "客户名称"
      - name: customer_type
        description: "客户类型（1=个人，2=企业）"
      - name: credit_id
        description: "授信ID"
      - name: credit_quota
        description: "授信额度"
      - name: remain_quota
        description: "剩余额度"
      - name: credit_used_quota
        description: "授信已用额度"
      - name: credit_start_date
        description: "授信起期"
      - name: credit_end_date
        description: "授信止期"
      - name: days_to_maturity
        description: "到期剩余天数"
      - name: is_due_within_7d
        description: "7天内到期标识"
      - name: is_due_within_30d
        description: "30天内到期标识"
      - name: is_due_within_90d
        description: "90天内到期标识"
      - name: is_overdue
        description: "已逾期标识"
      - name: utilization_rate
        description: "用信率（%）"
      - name: is_valid_credit
        description: "有效授信标识"
      - name: has_balance
        description: "有余额标识"
      - name: is_not_expired
        description: "未过期标识"
      - name: is_bank_acceptance
        description: "银承产品标识（financial_product_id = 73）"
      - name: is_steel_trade_acceptance
        description: "钢贸银承产品标识（financial_product_id = 69）"
      - name: credit_result
        description: "授信结果"
      - name: financial_product_id
        description: "金融产品ID"
      - name: fund_org_id
        description: "资金方ID"
      - name: dw_update_time
        description: "数据仓库更新时间"

  - name: dws_fund_customer_loan_balance_agg_df
    description: "客户贷款余额日聚合表，按客户+统计日期粒度汇总贷款余额核心指标（线上/线下/授信/逾期/到期）"
    columns:
      - name: customer_id
        description: "客户ID"
      - name: customer_name
        description: "客户名称"
      - name: customer_type
        description: "客户类型（1=个人，2=企业）"
      - name: stats_date
        description: "统计日期"
      - name: total_credit_quota
        description: "总授信额度"
      - name: total_remain_quota
        description: "总剩余额度（客户剩余可用授信）"
      - name: total_credit_used_quota
        description: "总授信已用额度"
      - name: total_loan_balance
        description: "总贷款余额（线上+线下）"
      - name: online_loan_balance
        description: "线上贷款余额"
      - name: offline_loan_balance
        description: "线下贷款余额"
      - name: online_promissory_note_cnt
        description: "线上在贷借据笔数"
      - name: online_overdue_balance
        description: "线上逾期余额"
      - name: online_overdue_cnt
        description: "线上逾期借据笔数"
      - name: online_due_7d_balance
        description: "7天内到期余额（线上）"
      - name: online_due_30d_balance
        description: "30天内到期余额（线上）"
      - name: prev_total_loan_balance
        description: "昨日总贷款余额"
      - name: daily_balance_change
        description: "当日余额变动"
      - name: total_offline_cumulative_disbursement
        description: "线下累计放款金额"
      - name: total_offline_cumulative_repay
        description: "线下累计还款金额"
      - name: year_offline_cumulative_disbursement
        description: "线下年累计放款金额"
      - name: year_offline_cumulative_repay
        description: "线下年累计还款金额"
      - name: utilization_rate
        description: "用信率（%）"
      - name: overdue_rate
        description: "逾期率（%）"
      - name: is_loan_customer
        description: "是否贷款客户（'0'/'1'）"
      - name: has_online_loan
        description: "是否有线上贷款（'0'/'1'）"
      - name: has_offline_loan
        description: "是否有线下贷款（'0'/'1'）"
      - name: dw_update_time
        description: "数据仓库更新时间"

  - name: dws_fund_customer_loan_repay_agg_df
    description: "客户借据放还款日统计表，按客户+借据+统计日期粒度汇总线上/线下贷款与还款核心指标"
    columns:
      - name: stats_date
        description: "统计日期"
      - name: customer_id
        description: "客户ID"
      - name: customer_name
        description: "客户名称"
      - name: customer_type
        description: "客户类型"
      - name: promissory_note_no
        description: "借据编号"
      - name: online_loan_amt
        description: "线上贷款金额"
      - name: online_loan_cnt
        description: "线上贷款笔数"
      - name: online_repay_amt
        description: "线上还款金额"
      - name: online_repay_cnt
        description: "线上还款笔数"
      - name: online_repay_interest_amt
        description: "线上还款利息"
      - name: offline_loan_amt
        description: "线下贷款金额"
      - name: offline_loan_cnt
        description: "线下贷款笔数"
      - name: offline_repay_amt
        description: "线下还款金额"
      - name: offline_repay_cnt
        description: "线下还款笔数"
      - name: total_loan_amt
        description: "总贷款金额"
      - name: total_loan_cnt
        description: "总贷款笔数"
      - name: total_repay_amt
        description: "总还款金额"
      - name: total_repay_cnt
        description: "总还款笔数"
      - name: total_repay_interest_amt
        description: "总还款利息（仅线上有利息明细）"
      - name: net_loan_amt
        description: "净增额"
      - name: has_loan
        description: "是否有贷款"
      - name: has_repay
        description: "是否有还款"
      - name: dw_update_time
        description: "数据仓库更新时间"

  - name: dws_fund_customer_promissory_note_agg_df
    description: "借据日明细宽表，按借据+日期粒度记录每笔借据的完整状态"
    columns:
      - name: promissory_note_id
        description: "借据ID"
      - name: stats_date
        description: "统计日期"
      - name: customer_id
        description: "客户ID"
      - name: customer_name
        description: "客户名称"
      - name: customer_type
        description: "客户类型"
      - name: promissory_note_no
        description: "借据编号"
      - name: contract_code
        description: "合同编号"
      - name: credit_quota
        description: "授信总额度"
      - name: credit_remain_quota
        description: "授信剩余额度"
      - name: credit_used_quota
        description: "授信已用额度"
      - name: credit_start_date
        description: "授信起期"
      - name: credit_end_date
        description: "授信止期"
      - name: note_credit_quota
        description: "借据额度"
      - name: loan_balance
        description: "借据余额"
      - name: remain_quota
        description: "借据剩余额度"
      - name: apply_quota
        description: "申请额度"
      - name: interest_rate
        description: "利率"
      - name: promissory_note_start_date
        description: "借据起期"
      - name: promissory_note_end_date
        description: "借据止期"
      - name: days_to_maturity
        description: "距到期天数"
      - name: is_overdue
        description: "是否逾期"
      - name: is_due_within_7d
        description: "是否7天内到期"
      - name: is_due_within_30d
        description: "是否30天内到期"
      - name: is_valid_promissory_note
        description: "是否有效借据"
      - name: has_balance
        description: "是否有余额"
      - name: is_on_loan
        description: "是否在贷"
      - name: utilization_rate
        description: "用信率（%）"
      - name: due_30d_balance
        description: "30天内到期余额"
      - name: overdue_balance
        description: "逾期余额"
      - name: financial_product_id
        description: "金融产品ID"
      - name: financial_product_name
        description: "金融产品名称"
      - name: fund_org_id
        description: "资金方ID"
      - name: fund_org_name
        description: "资金方名称"
      - name: repay_type
        description: "还款方式"
      - name: promissory_note_sn
        description: "借据流水号"
      - name: entrust_account
        description: "委托账户"
      - name: apply_free_time
        description: "申请放款时间"
      - name: store_id
        description: "门店ID"
      - name: store_name
        description: "门店名称"
      - name: apply_status
        description: "申请状态"
      - name: connection_type
        description: "对接类型"
      - name: promissory_note_status
        description: "借据状态"
      - name: create_time
        description: "创建时间"
      - name: update_time
        description: "更新时间"
      - name: dw_update_time
        description: "数据仓库更新时间"

  - name: dws_fund_customer_rfm_df
    description: "客户RFM指标日汇总表，按客户+场景汇总RFM指标，使用分位数评分支持客户价值分析"
    columns:
      - name: customer_id
        description: "客户ID"
      - name: stat_date
        description: "统计日期（RFM计算执行日期）"
      - name: latest_trx_date
        description: "最新业务日期"
      - name: scene_id
        description: "场景ID"
      - name: scene_name
        description: "场景名称"
      - name: trx_count
        description: "交易次数"
      - name: total_loan_amount
        description: "交易总金额"
      - name: total_interest_amount
        description: "利息总额"
      - name: total_loan_balance
        description: "借据余额总额"
      - name: recency_days
        description: "最近活跃天数（R）"
      - name: frequency_count
        description: "交易频次（F）"
      - name: monetary_amount
        description: "交易金额（M）"
      - name: r_score_global
        description: "R评分（全局）"
      - name: f_score_global
        description: "F评分（全局）"
      - name: m_score_global
        description: "M评分（全局）"
      - name: rfm_total_score_global
        description: "RFM总分（全局）"
      - name: r_score_scene
        description: "R评分（场景内）"
      - name: f_score_scene
        description: "F评分（场景内）"
      - name: m_score_scene
        description: "M评分（场景内）"
      - name: rfm_total_score_scene
        description: "RFM总分（场景内）"
      - name: customer_segment_global
        description: "客户分群（全局）"
      - name: customer_segment_scene
        description: "客户分群（场景内）"
      - name: stat_year
        description: "统计年份"
      - name: stat_month
        description: "统计月份"
      - name: stat_day
        description: "统计日"
      - name: stat_quarter
        description: "统计季度"
      - name: stat_week
        description: "统计周"
      - name: dw_update_date
        description: "数据更新日期"
